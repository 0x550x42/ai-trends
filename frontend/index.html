  @keyframes shimmer { to { background-position: 200% center; } }
  #title-block .date {

    color: #2a6a8a;
    margin-top: 3px;

  #title-block .date::before,
  #title-block .date::after {
    content: '— ';
  }

  canvas { display:block; position:absolute; top:0; left:0; }

  /* Bubble wrappers */
  .bubble {
    position: absolute;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    will-change: transform;
    transform: translate(-50%, -50%);
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .bubble:hover { transform: translate(-50%, -50%) scale(1.15) !important; z-index: 50; }

  /* Neural pulse ring */
  .bubble::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 1.5px solid var(--bubble-color, rgba(100,200,255,0.4));
    animation: neuron-pulse 3s ease-out infinite;
    animation-delay: var(--pulse-delay, 0s);
    pointer-events: none;
  }
  @keyframes neuron-pulse {
    0%   { transform: scale(1);    opacity: 0.6; }
    60%  { transform: scale(1.35); opacity: 0;   }
    100% { transform: scale(1.35); opacity: 0;   }
  }

  .bubble-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .bubble-inner::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.12), transparent 60%);
    z-index: 2;
    pointer-events: none;
  }

  .bubble img {
    border-radius: 50%;
    object-fit: contain;
    position: relative;
    z-index: 1;
  }

  .trend-label {
    position: absolute;
    bottom: -2px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    font-weight: 700;
    white-space: nowrap;
    z-index: 5;
    padding: 1px 5px;
    border-radius: 8px;
  }
  .trend-up   { color: #4ade80; background: rgba(0,0,0,0.5); }
  .trend-down { color: #f87171; background: rgba(0,0,0,0.5); }

  .rank-label {
    position: absolute;
    top: 2px; right: 4px;
    font-size: 8px;
    font-weight: 700;
    color: rgba(255,255,255,0.35);
    z-index: 5;
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    background: rgba(5, 18, 38, 0.97);
    border-radius: 14px;
    padding: 16px 18px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s ease;
    max-width: 250px;
    z-index: 999;
    backdrop-filter: blur(20px);
  }
  .tooltip.show { opacity: 1; }

  .tt-head { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .tt-logo-wrap {
    width:38px; height:38px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;

  .tt-name { font-size:14px; font-weight:700; color:#f1f5f9; }
  .tt-company { font-size:11px; color:#475569; margin-top:1px; }

  .tt-score-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px;
  }
  .tt-score-bar {
    flex: 1; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.06); overflow:hidden;
  }
  .tt-score-fill { height:100%; border-radius:2px; }
  .tt-score-num { font-size:11px; font-weight:700; }

  .tt-desc { font-size:11px; color:#94a3b8; line-height:1.6; margin-bottom:10px; }

// ── Canvas setup ─────────────────────────────────────────────────
const bg   = document.getElementById('bg');
const ctx  = bg.getContext('2d');
const lc   = document.getElementById('lines');
const lctx = lc.getContext('2d');
let W, H;

function setSize() {
  W = bg.width  = lc.width  = window.innerWidth;
  H = bg.height = lc.height = window.innerHeight;
}

function drawBg() {
  ctx.clearRect(0,0,W,H);
  // Deep neural dark background
  const grad = ctx.createRadialGradient(W*0.5, H*0.5, 0, W*0.5, H*0.5, W*0.7);
  grad.addColorStop(0,   '#060d1f');
  grad.addColorStop(0.6, '#030912');
  grad.addColorStop(1,   '#010508');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);
}

// ── Neural connections (static, drawn once after build) ───────────
let connections = []; // { ax,ay,bx,by,colorA,colorB,alpha }

function buildConnections() {
  connections = [];
  const drawn = new Set();
  for (let i = 0; i < bubbleData.length; i++) {
    const sorted = bubbleData
      .map((b, j) => {
        if (j === i) return null;
        const dx = b.x - bubbleData[i].x, dy = b.y - bubbleData[i].y;
        return { j, d: Math.sqrt(dx*dx + dy*dy) };
      })
      .filter(Boolean)
      .sort((a, b) => a.d - b.d)
      .slice(0, 4); // 4 neighbours for denser network look

    sorted.forEach(({ j, d }) => {
      const key = [Math.min(i,j), Math.max(i,j)].join('-');
      if (drawn.has(key) || d > 280) return;
      drawn.add(key);
      const a = bubbleData[i], b = bubbleData[j];
      connections.push({
        ax: a.x, ay: a.y, bx: b.x, by: b.y,
        colorA: a.color, colorB: b.color,
        alpha: Math.max(0, 1 - d / 280) * 0.25,
        len: d,
      });
    });
  }
}

function drawConnections() {
  lctx.clearRect(0,0,W,H);
  connections.forEach(c => {
    const grad = lctx.createLinearGradient(c.ax, c.ay, c.bx, c.by);
    grad.addColorStop(0, `rgba(${hexToRgb(c.colorA)}, ${c.alpha})`);
    grad.addColorStop(1, `rgba(${hexToRgb(c.colorB)}, ${c.alpha})`);
    lctx.beginPath();
    lctx.moveTo(c.ax, c.ay);
    lctx.lineTo(c.bx, c.by);
    lctx.strokeStyle = grad;
    lctx.lineWidth = 0.8;
    lctx.stroke();
  });
}

// ── Signal pulses traveling along connections ─────────────────────
const pulses = [];

function spawnPulse() {
  if (connections.length === 0) return;
  const c = connections[Math.floor(Math.random() * connections.length)];
  pulses.push({ c, t: 0, speed: 0.004 + Math.random() * 0.006 });
}

// Spawn a new pulse every ~400ms
setInterval(spawnPulse, 400);

function drawPulses() {
  pulses.forEach((p, i) => {
    p.t += p.speed;
    const x = p.c.ax + (p.c.bx - p.c.ax) * p.t;
    const y = p.c.ay + (p.c.by - p.c.ay) * p.t;
    const r = hexToRgb(p.c.colorA);
    const alpha = Math.sin(p.t * Math.PI) * 0.9;

    lctx.beginPath();
    lctx.arc(x, y, 2.5, 0, Math.PI * 2);
    lctx.fillStyle = `rgba(${r}, ${alpha})`;
    lctx.fill();

    // Glow
    const grd = lctx.createRadialGradient(x,y,0, x,y,8);
    grd.addColorStop(0, `rgba(${r}, ${alpha * 0.6})`);
    grd.addColorStop(1, `rgba(${r}, 0)`);
    lctx.beginPath();
    lctx.arc(x, y, 8, 0, Math.PI * 2);
    lctx.fillStyle = grd;
    lctx.fill();
  });
  // Remove finished pulses
  for (let i = pulses.length - 1; i >= 0; i--) {
    if (pulses[i].t >= 1) pulses.splice(i, 1);
  }
}

// ── Bubble layout ────────────────────────────────────────────────
const scene = document.getElementById('scene');

let maxR = Math.min(W, H) * 0.058;
let minR = Math.min(W, H) * 0.008;
const maxScore = 98;

let bubbleData = []; // declared in outer scope so float loop can access it

async function loadAndBuild() {
  try {
    const res  = await fetch(`${WORKER_URL}/trends`);
    const data = await res.json();
    if (Array.isArray(data.tools) && data.tools.length > 0) {
      TOOLS = data.tools.map(t => ({
        ...t,
        cat: t.category || t.cat || 'Other',
      }));
      // Update subtitle date
      const d = new Date(data.generatedAt);
      document.getElementById('subtitle').textContent =
        `— ${d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }).toUpperCase()} —`;
    }
  } catch (e) {
    console.warn('[ai-trends] Could not load from worker, using fallback data:', e.message);
  }
  TOOLS.sort((a, b) => b.score - a.score);
  TOOLS.forEach((t, i) => t.rank = i + 1);
  build();
  requestAnimationFrame(floatLoop);
}

function build() {
  setSize();
  maxR = Math.min(W, H) * 0.058;
  minR = Math.min(W, H) * 0.008;
  scene.innerHTML = '';
  bubbleData = [];

  // ── Greedy circle packing ───────────────────────────────────────
// Place largest bubble at center, then greedily place each next bubble
// as close to center as possible without overlapping any placed bubble.

const cx0 = W / 2, cy0 = H / 2 + 20;

bubbleData = TOOLS.map(t => ({
  ...t,
  r: minR + (t.score / maxScore) * (maxR - minR),
  x: cx0, y: cy0,
  floatOffset: Math.random() * Math.PI * 2,
  floatSpeed:  0.25 + Math.random() * 0.2,
  floatAmp:    3.5  + Math.random() * 4.0,
}));

// Place first bubble at center
bubbleData[0].x = cx0;
bubbleData[0].y = cy0;

const placed = [bubbleData[0]];

function overlaps(x, y, r, candidates) {
  for (const p of candidates) {
    const dx = x - p.x, dy = y - p.y;
    if (dx*dx + dy*dy < (r + p.r + 2) * (r + p.r + 2)) return true;
  }
  return false;
}

for (let i = 1; i < bubbleData.length; i++) {
  const b = bubbleData[i];
  let bestX = cx0, bestY = cy0, bestDist = Infinity;

  // Try positions tangent to every pair of placed circles (and tangent to single circles)
  const candidates = [];

  // Tangent to each placed circle
  for (const p of placed) {
    const tangentDist = p.r + b.r + 2;
    for (let a = 0; a < Math.PI * 2; a += 0.15) {
      candidates.push({
        x: p.x + Math.cos(a) * tangentDist,
        y: p.y + Math.sin(a) * tangentDist,
      });
    }
  }

  // Also try tangent to pairs
  for (let pi = 0; pi < placed.length; pi++) {
    for (let pj = pi + 1; pj < placed.length; pj++) {
      const A = placed[pi], B = placed[pj];
      const dx = B.x - A.x, dy = B.y - A.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      const rA = A.r + b.r + 2, rB = B.r + b.r + 2;
      if (d > rA + rB || d < Math.abs(rA - rB)) continue;
      const a2 = (rA*rA - rB*rB + d*d) / (2*d);
      const h2 = rA*rA - a2*a2;
      if (h2 < 0) continue;
      const h = Math.sqrt(h2);
      const mx = A.x + a2*(dx/d), my = A.y + a2*(dy/d);
      candidates.push({ x: mx + h*(dy/d),  y: my - h*(dx/d) });
      candidates.push({ x: mx - h*(dy/d),  y: my + h*(dx/d) });
    }
  }

  for (const c of candidates) {
    if (overlaps(c.x, c.y, b.r, placed)) continue;
    const dist = (c.x - cx0)**2 + (c.y - cy0)**2;
    if (dist < bestDist) { bestDist = dist; bestX = c.x; bestY = c.y; }
  }

  b.x = bestX; b.y = bestY;
  placed.push(b);
}

// Re-center entire cluster
const ccx = bubbleData.reduce((s,b) => s + b.x, 0) / bubbleData.length;
const ccy = bubbleData.reduce((s,b) => s + b.y, 0) / bubbleData.length;
bubbleData.forEach(b => { b.x += cx0 - ccx; b.y += cy0 - ccy; });

  // ── Draw bg + connections ──────────────────────────────────────
  drawBg();
  createBubbleDom();
  buildConnections();
  drawConnections();
} // end build()

// ── Create DOM bubbles ───────────────────────────────────────────
function hexToRgb(hex) {
  const h = hex.replace('#','');
  const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
  return `${r},${g},${b}`;
}

function createBubbleDom() {
bubbleData.forEach((t, i) => {
  const d = t.r * 2;
  const el = document.createElement('div');
  el.className = 'bubble';
  el.style.cssText = `
    left:${t.x}px; top:${t.y}px;
    width:${d}px; height:${d}px;
    --bubble-color: ${t.color};
    --pulse-delay: ${(i * 0.17 % 3).toFixed(2)}s;
    box-shadow: 0 0 ${t.r*0.7}px rgba(${hexToRgb(t.color)},0.55),
                0 0 ${t.r*1.8}px rgba(${hexToRgb(t.color)},0.18),
                inset 0 0 ${t.r*0.4}px rgba(${hexToRgb(t.color)},0.1);
    border: 1.5px solid rgba(${hexToRgb(t.color)}, 0.8);
    background: radial-gradient(circle at 40% 35%,
      rgba(${hexToRgb(t.color)},0.25),
      rgba(${hexToRgb(t.color)},0.08) 50%,
      rgba(0,0,0,0.6));
  `;

  const inner = document.createElement('div');
  inner.className = 'bubble-inner';

  // Logo image
  const img = document.createElement('img');
  img.src = `https://www.google.com/s2/favicons?domain=${t.domain}&sz=64`;
  img.alt = t.name;
  img.width  = Math.round(d * 0.52);
  img.height = Math.round(d * 0.52);
  img.onerror = () => {
    img.style.display = 'none';
    const fb = document.createElement('div');
    fb.style.cssText = `font-size:${Math.round(d*0.36)}px; color:rgba(${hexToRgb(t.color)},0.9);`;
    fb.textContent = t.name[0];
    inner.appendChild(fb);
  };

  inner.appendChild(img);
  el.appendChild(inner);

  // Mouse events
  el.addEventListener('click', () => window.open(`https://${t.domain}`, '_blank'));
  el.addEventListener('mouseenter', e => showTT(e.clientX, e.clientY, t));
  el.addEventListener('mousemove',  e => moveTT(e.clientX, e.clientY));
  el.addEventListener('mouseleave', () => tt.classList.remove('show'));

  // Touch events
  el.addEventListener('touchstart', e => {
    e.preventDefault();
    const touch = e.touches[0];
    showTT(touch.clientX, touch.clientY, t);
  }, { passive: false });
  el.addEventListener('touchend', () => {
    setTimeout(() => tt.classList.remove('show'), 2000);
  });

  scene.appendChild(el);
  bubbleData[i].el = el;
  el.style.left = t.x + 'px';
  el.style.top  = t.y + 'px';
});
} // end createBubbleDom

// ── Animation loop: float bubbles + draw signal pulses ────────────
let t0 = null;
function floatLoop(ts) {
  if (!t0) t0 = ts;
  const elapsed = (ts - t0) / 1000;

  // Float bubbles
  bubbleData.forEach(b => {
    if (!b.el) return;
    const dx = Math.cos(elapsed * b.floatSpeed * 0.7 + b.floatOffset) * b.floatAmp;
    const dy = Math.sin(elapsed * b.floatSpeed       + b.floatOffset) * b.floatAmp;
    b.el.style.transform = `translate(calc(-50% + ${dx.toFixed(2)}px), calc(-50% + ${dy.toFixed(2)}px))`;
  });

  // Redraw connections + pulses every frame
  drawConnections();
  drawPulses();

  requestAnimationFrame(floatLoop);
}

// ── Boot — fetch from worker then build ──────────────────────────
loadAndBuild();

// ── Tooltip ──────────────────────────────────────────────────────
const tt = document.getElementById('tt');

function showTT(cx, cy, t) {
  document.getElementById('tt-img').src = `https://www.google.com/s2/favicons?domain=${t.domain}&sz=64`;
  document.getElementById('tt-name').textContent    = t.name;
  document.getElementById('tt-company').textContent = `${t.company} · ${t.cat}`;
  document.getElementById('tt-fill').style.cssText  = `width:${t.score}%; background: linear-gradient(90deg, ${t.color}, ${t.color}88);`;
  document.getElementById('tt-num').style.color     = t.color;
  document.getElementById('tt-num').textContent     = `${t.score}/100`;
  document.getElementById('tt-desc').textContent    = t.desc;

  const tv = t.trend;
  const trendStr = tv > 0 ? `<span style="color:#4ade80">↑ ${tv}% this week</span>`
                 : tv < 0 ? `<span style="color:#f87171">↓ ${Math.abs(tv)}% this week</span>`
                 : `<span style="color:#64748b">→ Stable</span>`;
  document.getElementById('tt-pills').innerHTML = `
    <span class="tt-pill"><b>Rank</b> #${t.rank}</span>
    <span class="tt-pill"><b>Launched</b> ${t.launched}</span>
    <span class="tt-pill"><b>Trend</b> ${trendStr}</span>
    <span class="tt-pill"><b>Category</b> ${t.cat}</span>
  `;
  tt.style.borderColor = `rgba(${hexToRgb(t.color)}, 0.35)`;
  tt.style.boxShadow   = `0 20px 60px rgba(0,0,0,0.8), 0 0 30px rgba(${hexToRgb(t.color)},0.1)`;
  moveTT(cx, cy);
  tt.classList.add('show');
}

function moveTT(cx, cy) {
  const ttW = 260, ttH = 220;
  const mobile = window.innerWidth < 600;
  let x, y;
  if (mobile) {
    // center tooltip horizontally, show above touch point
    x = Math.max(8, Math.min(window.innerWidth - ttW - 8, cx - ttW / 2));
    y = cy - ttH - 16;
    if (y < 8) y = cy + 20;
  } else {
    x = cx + 20;
    y = cy - 70;
    if (x + ttW > window.innerWidth)  x = cx - ttW - 8;
    if (y + ttH > window.innerHeight) y = cy - ttH;
    if (y < 0) y = 8;
  }
  tt.style.left = x + 'px';
  tt.style.top  = y + 'px';
}

function hexToRgb(hex) {
  const h = hex.replace('#','');
  return `${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)}`;
}

// Debounced resize — rebuilds entire layout for new viewport
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { t0 = null; build(); }, 250);
});
</script>
