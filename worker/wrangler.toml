name = "ai-trends-worker"
main = "index.js"
compatibility_date = "2024-01-01"

# ─── Cron schedule ────────────────────────────────────────────────
# Runs every 24 hours at midnight UTC
[triggers]
crons = ["0 0 * * *"]

# ─── KV namespace ─────────────────────────────────────────────────
# Create with: npx wrangler kv:namespace create TRENDS_KV
# Paste the returned id below
[[kv_namespaces]]
binding = "TRENDS_KV"
id      = "4909011be9e440a5835baa30b52ce19b"

# ─── Secrets (never put real values here) ─────────────────────────
# Set each with: npx wrangler secret put SECRET_NAME
#
#   npx wrangler secret put LLM_PROVIDER   → openai | claude | gemini
#   npx wrangler secret put LLM_API_KEY    → your API key
#   npx wrangler secret put REFRESH_TOKEN  → any random string you choose

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true
